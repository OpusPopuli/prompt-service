services:
  prompt-db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prompt_service_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  prompt-service:
    build: .
    ports:
      - '3101:3100'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@prompt-db-test:5432/prompt_service_test?schema=public
      API_KEYS: us-east:test-api-key-1,us-west:test-api-key-2
      ADMIN_API_KEYS: admin-test-key-1
      PROMPT_TTL_SECONDS: 300
      PORT: 3100
    depends_on:
      prompt-db-test:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3100/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test-runner
    environment:
      PROMPT_SERVICE_URL: http://prompt-service:3100
      DATABASE_URL: postgresql://postgres:postgres@prompt-db-test:5432/prompt_service_test?schema=public
      API_KEY: test-api-key-1
      API_KEY_2: test-api-key-2
      ADMIN_API_KEY: admin-test-key-1
    depends_on:
      prompt-service:
        condition: service_healthy
    profiles:
      - test
